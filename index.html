<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Job Hunt Dashboard</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:#0f0f13;color:#e4e4e7;line-height:1.6}header{background:linear-gradient(135deg,#0f0f13 0%,#1a1a24 100%);border-bottom:1px solid rgba(79,142,247,0.1);padding:2rem 1rem;text-align:center;position:sticky;top:0;z-index:100}.header-container{max-width:1400px;margin:0 auto}.header-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;margin-bottom:.5rem}.header-title h1{font-size:2rem;font-weight:700;color:#fff}.header-date{font-size:.875rem;color:#a1a1a6;background:rgba(79,142,247,0.08);padding:.5rem 1rem;border-radius:.5rem;border:1px solid rgba(79,142,247,0.15)}.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-top:1.5rem}.stat-card{background:rgba(79,142,247,0.08);border:1px solid rgba(79,142,247,0.15);border-radius:.75rem;padding:1rem;text-align:center}.stat-number{font-size:1.875rem;font-weight:700;color:#4f8ef7}.stat-label{font-size:.75rem;color:#a1a1a6;text-transform:uppercase;letter-spacing:.05em}.controls{max-width:1400px;margin:2rem auto 0;padding:0 1rem}.search-box{width:100%;padding:.875rem 1rem;background:#1a1a24;border:1px solid rgba(79,142,247,0.15);border-radius:.75rem;color:#e4e4e7;font-size:.95rem;margin-bottom:1.5rem}.search-box:focus{outline:none;border-color:#4f8ef7}.filter-group{display:flex;flex-wrap:wrap;gap:.75rem;margin-bottom:1.5rem}.filter-btn{padding:.625rem 1rem;background:transparent;border:1px solid rgba(79,142,247,0.25);border-radius:.5rem;color:#a1a1a6;font-size:.875rem;cursor:pointer}.filter-btn.active{background:#4f8ef7;border-color:#4f8ef7;color:#fff}.sort-group{display:flex;gap:.75rem;align-items:center;margin-bottom:1.5rem}.sort-label{font-size:.875rem;color:#a1a1a6}.sort-select{padding:.625rem .75rem;background:#1a1a24;border:1px solid rgba(79,142,247,0.15);border-radius:.5rem;color:#e4e4e7;font-size:.875rem;cursor:pointer}.container{max-width:1400px;margin:0 auto;padding:2rem 1rem}.jobs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:1.5rem;margin-top:2rem}.job-card{background:#1a1a24;border:1px solid rgba(79,142,247,0.1);border-radius:.875rem;padding:1.5rem;transition:all .3s ease;display:flex;flex-direction:column;position:relative;overflow:hidden}.job-card:hover{border-color:#4f8ef7;transform:translateY(-4px);box-shadow:0 10px 30px rgba(79,142,247,0.15)}.job-company{font-size:.75rem;color:#4f8ef7;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem}.job-title{font-size:1.125rem;font-weight:600;color:#fff;margin-bottom:.75rem;line-height:1.4}.job-meta{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1rem}.location-badge{display:inline-flex;background:rgba(79,142,247,0.1);color:#4f8ef7;padding:.375rem .75rem;border-radius:.375rem;font-size:.8rem;font-weight:500;width:fit-content}.salary{color:#10b981;font-weight:500}.salary-not-listed{color:#71717a;font-style:italic}.status-badge{display:inline-flex;padding:.5rem .875rem;border-radius:.5rem;font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin:1rem 0}.status-new{background:rgba(79,142,247,0.15);color:#4f8ef7}.status-applied{background:rgba(234,179,8,0.15);color:#eab308}.status-interviewing{background:rgba(16,185,129,0.15);color:#10b981}.status-offer{background:rgba(168,85,247,0.15);color:#a855f7}.status-rejected{background:rgba(239,68,68,0.15);color:#ef4444}.button-group{display:flex;gap:.75rem;margin-top:auto}.btn{flex:1;padding:.75rem 1rem;border:none;border-radius:.5rem;font-size:.875rem;font-weight:500;cursor:pointer;transition:all .3s ease;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:.5rem}.btn-view{background:#4f8ef7;color:#fff}.btn-applied{background:transparent;border:1px solid rgba(79,142,247,0.3);color:#4f8ef7}.btn-applied.disabled{opacity:.5;cursor:not-allowed}.date-seen{color:#71717a;font-size:.8rem}@media(max-width:768px){.jobs-grid{grid-template-columns:1fr}}</style></head><body><header><div class="header-container"><div class="header-top"><div class="header-title"><h1>Drew Malhotra</h1><p>Job Hunt Dashboard</p></div><div class="header-date" id="today-date"></div></div><div class="stats-bar" id="stats-bar"></div></div></header><div class="controls"><input type="text" class="search-box" id="search-input" placeholder="Search by company or job title..."><div class="filter-group" id="filter-group"></div><div class="sort-group"><span class="sort-label">Sort by:</span><select class="sort-select" id="sort-select"><option value="newest">Newest First</option><option value="salary">Highest Salary</option><option value="company">Company (A-Z)</option></select></div></div><div class="container"><div class="jobs-grid" id="jobs-grid"></div><div id="empty-state" style="display:none;text-align:center;padding:3rem;color:#a1a1a6;">No jobs match your filters.</div></div><script>const jobData={"last_updated":"2026-04-06","jobs":[{"id":"crowdstrike-sr-sdet-ii-ng-siem","title":"Sr. SDET II - NG-SIEM","company":"CrowdStrike","salary":"$155,000 - $255,000","location":"Remote (East Coast US)","url":"https://jobs.accel.com/companies/crowdstrike/jobs/41858099-sr-sdet-ng-siem-remote-east-coast","date_seen":"2026-04-06"},{"id":"crowdstrike-sr-sdet-ng-siem","title":"Sr. SDET - NG-SIEM","company":"CrowdStrike","salary":"$135,000 - $210,000","location":"Remote (East Coast US)","url":"https://builtin.com/job/sr-sdet-ii-ng-siem-remote-east-coast/3670322","date_seen":"2026-04-06"},{"id":"quanata-senior-sdet-data-qa","title":"Senior SDET, Data QA","company":"Quanata","salary":"$185,000 - $265,000","location":"Remote (US)","url":"https://www.remoterocketship.com/company/quanata/jobs/senior-sdet-data-qa-united-states-remote/","date_seen":"2026-04-06"},{"id":"quanata-senior-sdet","title":"Senior SDET","company":"Quanata","salary":null,"location":"Remote (US)","url":"https://boards.greenhouse.io/quanata/jobs/5159154004","date_seen":"2026-04-06"},{"id":"apollo-io-senior-sdet","title":"Senior SDET","company":"Apollo.io","salary":null,"location":"Remote (Global)","url":"https://boards.greenhouse.io/apolloio/jobs/5189009004","date_seen":"2026-04-06"},{"id":"quanata-sdet-back-end","title":"SDET, Back End","company":"Quanata","salary":null,"location":"Remote (US)","url":"https://job-boards.greenhouse.io/quanata/jobs/5752862004","date_seen":"2026-04-06"},{"id":"netflix-sdet-5-tv-web-player","title":"SDET 5 - TV & Web Player Platform","company":"Netflix","salary":"$150,000 - $300,000 est.","location":"Remote (USA)","url":"https://explore.jobs.netflix.net/careers/job/790304215698","date_seen":"2026-04-06"},{"id":"rapidfort-sr-sdet-python","title":"Sr. SDET / QA Automation (Python)","company":"RapidFort","salary":"$120,000 - $180,000","location":"Remote (US)","url":"https://www.remoterocketship.com/us/company/rapidfort/jobs/senior-sdet-sr-qa-automation-engineer-python-cli-ci-cd-containers-united-states-remote/","date_seen":"2026-04-06"},{"id":"cyware-sdet-python","title":"SDET - Python","company":"Cyware","salary":null,"location":"Remote (USA)","url":"https://boards.greenhouse.io/cyware/jobs/5794592003","date_seen":"2026-04-06"},{"id":"bobsled-senior-sdet","title":"Senior SDET","company":"Bobsled","salary":null,"location":"Remote (Global)","url":"https://boards.greenhouse.io/bobsledinc/jobs/4385159005","date_seen":"2026-04-06"},{"id":"airbnb-staff-automation","title":"Staff Automation Engineer","company":"Airbnb","salary":null,"location":"Remote (US)","url":"https://careers.airbnb.com/positions/6669384/","date_seen":"2026-04-06"},{"id":"airbnb-senior-ios","title":"Senior iOS Automation Engineer","company":"Airbnb","salary":null,"location":"Remote (US)","url":"https://careers.airbnb.com/positions/7453190/","date_seen":"2026-04-06"},{"id":"airbnb-senior-android","title":"Senior Android QA Engineer","company":"Airbnb","salary":null,"location":"Remote (US)","url":"https://careers.airbnb.com/positions/6602436/","date_seen":"2026-04-06"},{"id":"reveleer-sdet","title":"SDET","company":"Reveleer","salary":"$130,000 - $150,000","location":"Remote (US)","url":"https://jobs.upfront.com/companies/reveleer/jobs/60312964","date_seen":"2026-04-06"},{"id":"lastpass-senior-sdet","title":"Senior SDET","company":"LastPass","salary":null,"location":"Remote","url":"https://boards.greenhouse.io/lastpass/jobs/4376661005","date_seen":"2026-04-06"}]};let jobs=[],jobStatuses={},currentFilter='all',currentSearch='',currentSort='newest';const statusOptions=['all','applied','interviewing','offer','rejected','new'];function init(){jobs=jobData.jobs.map(j=>({...j,status:jobStatuses[j.id]||'new'}));renderToday();renderStats();renderFilters();render();}function renderToday(){document.getElementById('today-date').textContent=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});}function renderStats(){const total=jobs.length,applied=jobs.filter(j=>j.status!=='new').length,interviewing=jobs.filter(j=>j.status==='interviewing').length,days=Math.floor((new Date()-new Date(Math.min(...jobs.map(j=>new Date(j.date_seen)))))/(86400000));document.getElementById('stats-bar').innerHTML=[{label:'Total Jobs',value:total},{label:'Applied',value:applied},{label:'Interviewing',value:interviewing},{label:'Days Active',value:days}].map(s=>'<div class="stat-card"><div class="stat-number">'+s.value+'</div><div class="stat-label">'+s.label+'</div></div>').join('');}function renderFilters(){document.getElementById('filter-group').innerHTML=statusOptions.map(o=>'<button class="filter-btn'+(currentFilter===o?' active':'')+'" data-filter="'+o+'">'+o.charAt(0).toUpperCase()+o.slice(1)+'</button>').join('');document.querySelectorAll('.filter-btn').forEach(b=>b.addEventListener('click',e=>{currentFilter=e.target.dataset.filter;renderFilters();render();}));}function getFiltered(){let f=jobs.filter(j=>(currentFilter==='all'||j.status===currentFilter)&&(currentSearch===''||j.company.toLowerCase().includes(currentSearch.toLowerCase())||j.title.toLowerCase().includes(currentSearch.toLowerCase())));if(currentSort==='salary')f.sort((a,b)=>(b.salary?parseInt(b.salary.match(/d+/g).pop())*1000:0)-(a.salary?parseInt(a.salary.match(/d+/g).pop())*1000:0));else if(currentSort==='company')f.sort((a,b)=>a.company.localeCompare(b.company));return f;}function formatDate(d){const dt=new Date(d),t=new Date();return dt.toDateString()===t.toDateString()?'Today':dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});}function render(){const f=getFiltered(),grid=document.getElementById('jobs-grid'),empty=document.getElementById('empty-state');if(!f.length){grid.innerHTML='';empty.style.display='block';return;}empty.style.display='none';grid.innerHTML=f.map(j=>'<div class="job-card"><div class="job-company">'+j.company+'</div><div class="job-title">'+j.title+'</div><div class="job-meta"><div class="meta-item"><strong class="salary'+(j.salary?'':'-not-listed')+'">'+(j.salary||'Not listed')+'</strong></div><div class="location-badge">'+j.location+'</div><div class="date-seen">Seen '+formatDate(j.date_seen)+'</div></div><div class="status-badge status-'+j.status+'">'+j.status+'</div><div class="button-group"><a href="'+j.url+'" target="_blank" class="btn btn-view">View Job</a><button class="btn btn-applied'+(j.status!=='new'?' disabled':'')+'" data-job-id="'+j.id+'"'+(j.status!=='new'?' disabled':'')+'>Mark Applied</button></div></div>').join('');document.querySelectorAll('.btn-applied:not(.disabled)').forEach(b=>b.addEventListener('click',e=>{const id=e.target.dataset.jobId;jobStatuses[id]='applied';jobs=jobs.map(j=>j.id===id?{...j,status:'applied'}:j);renderStats();render();}));}document.getElementById('search-input').addEventListener('input',e=>{currentSearch=e.target.value;render();});document.getElementById('sort-select').addEventListener('change',e=>{currentSort=e.target.value;render();});init();</script></body></html>
