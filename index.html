<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Job Hunt Dashboard</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f13;color:#e4e4e7;line-height:1.6;overflow-x:hidden}::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-track{background:#1a1a24}::-webkit-scrollbar-thumb{background:#4f8ef7;border-radius:4px}::-webkit-scrollbar-thumb:hover{background:#3d7ae4}header{background:linear-gradient(135deg,#0f0f13 0%,#1a1a24 100%);border-bottom:1px solid rgba(79,142,247,.1);padding:2rem 1rem;text-align:center;position:sticky;top:0;z-index:100}.header-container{max-width:1400px;margin:0 auto}.header-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;margin-bottom:.5rem}.header-title h1{font-size:2rem;font-weight:700;color:#fff;letter-spacing:-.02em}.header-title p{font-size:.875rem;color:#a1a1a6;margin-top:.25rem}.header-date{font-size:.875rem;color:#a1a1a6;background:rgba(79,142,247,.08);padding:.5rem 1rem;border-radius:.5rem;border:1px solid rgba(79,142,247,.15)}.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-top:1.5rem}.stat-card{background:rgba(79,142,247,.08);border:1px solid rgba(79,142,247,.15);border-radius:.75rem;padding:1rem;text-align:center}.stat-number{font-size:1.875rem;font-weight:700;color:#4f8ef7;margin-bottom:.25rem}.stat-label{font-size:.75rem;color:#a1a1a6;text-transform:uppercase;letter-spacing:.05em;font-weight:500}.controls{max-width:1400px;margin:2rem auto 0;padding:0 1rem}.search-box{width:100%;padding:.875rem 1rem;background:#1a1a24;border:1px solid rgba(79,142,247,.15);border-radius:.75rem;color:#e4e4e7;font-family:'Inter',sans-serif;font-size:.95rem;margin-bottom:1.5rem}.search-box:focus{outline:none;border-color:#4f8ef7;background:rgba(79,142,247,.05);box-shadow:0 0 0 3px rgba(79,142,247,.1)}.search-box::placeholder{color:#71717a}.filter-group{display:flex;flex-wrap:wrap;gap:.75rem;margin-bottom:1.5rem}.filter-btn{padding:.625rem 1rem;background:transparent;border:1px solid rgba(79,142,247,.25);border-radius:.5rem;color:#a1a1a6;font-family:'Inter',sans-serif;font-size:.875rem;font-weight:500;cursor:pointer;transition:all .2s ease;white-space:nowrap}.filter-btn:hover{border-color:#4f8ef7;color:#4f8ef7}.filter-btn.active{background:#4f8ef7;border-color:#4f8ef7;color:#fff}.sort-group{display:flex;gap:.75rem;align-items:center;margin-bottom:1.5rem}.sort-label{font-size:.875rem;color:#a1a1a6;font-weight:500}.sort-select{padding:.625rem .75rem;background:#1a1a24;border:1px solid rgba(79,142,247,.15);border-radius:.5rem;color:#e4e4e7;font-family:'Inter',sans-serif;font-size:.875rem}.container{max-width:1400px;margin:0 auto;padding:2rem 1rem}.section{margin-bottom:2.5rem}.section-header{display:flex;justify-content:space-between;align-items:flex-end;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}.section-title{font-size:1.3rem;font-weight:700;color:#fff}.section-subtitle{font-size:.9rem;color:#a1a1a6}.jobs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:1.5rem}.job-card{background:#1a1a24;border:1px solid rgba(79,142,247,.1);border-radius:.875rem;padding:1.5rem;transition:all .25s ease;display:flex;flex-direction:column;overflow:hidden;position:relative}.job-card:hover{border-color:#4f8ef7;background:rgba(79,142,247,.05);transform:translateY(-4px);box-shadow:0 10px 30px rgba(79,142,247,.12)}.job-card-header{margin-bottom:1rem}.job-company{font-size:.75rem;color:#4f8ef7;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem}.job-title{font-size:1.125rem;font-weight:600;color:#fff;margin-bottom:.75rem;line-height:1.4}.job-meta{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1rem}.meta-row{display:flex;flex-wrap:wrap;gap:.5rem;align-items:center}.pill{display:inline-flex;align-items:center;padding:.35rem .7rem;border-radius:999px;font-size:.75rem;font-weight:600}.pill-location{background:rgba(79,142,247,.1);color:#4f8ef7}.pill-salary{background:rgba(16,185,129,.12);color:#10b981}.pill-muted{background:rgba(113,113,122,.15);color:#a1a1a6}.pill-apply_now{background:rgba(16,185,129,.15);color:#10b981}.pill-tailor{background:rgba(234,179,8,.15);color:#eab308}.pill-skip{background:rgba(113,113,122,.2);color:#a1a1a6}.pill-shortlist{background:rgba(79,142,247,.15);color:#4f8ef7}.pill-backlog{background:rgba(168,85,247,.15);color:#c084fc}.date-seen{color:#71717a;font-size:.8rem}.button-group{display:flex;gap:.75rem;margin-top:auto}.btn{flex:1;padding:.75rem 1rem;border:none;border-radius:.5rem;font-family:'Inter',sans-serif;font-size:.875rem;font-weight:500;cursor:pointer;transition:all .2s ease;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:.5rem}.btn-view{background:#4f8ef7;color:#fff}.btn-view:hover{background:#3d7ae4}.btn-applied{background:transparent;border:1px solid rgba(79,142,247,.3);color:#4f8ef7}.btn-applied:hover{background:rgba(79,142,247,.1);border-color:#4f8ef7}.btn-applied.disabled{opacity:.5;cursor:not-allowed}.empty-state{text-align:center;padding:3rem 1rem;color:#a1a1a6}.empty-state-icon{font-size:3rem;margin-bottom:1rem;opacity:.5}.empty-state-text{font-size:1.125rem;margin-bottom:.5rem}.empty-state-subtext{font-size:.875rem;color:#71717a}@media (max-width:768px){.jobs-grid{grid-template-columns:1fr}.header-title h1{font-size:1.5rem}.stats-bar{grid-template-columns:1fr 1fr}.section-header{align-items:flex-start}}@media (max-width:640px){header{padding:1.5rem 1rem}.header-top{flex-direction:column;align-items:stretch;text-align:center}.container{padding:1rem}.button-group{flex-direction:column}.btn{width:100%}}</style></head><body><header><div class="header-container"><div class="header-top"><div class="header-title"><h1>Drew Malhotra</h1><p>Job Hunt Dashboard</p></div><div class="header-date" id="today-date"></div></div><div class="stats-bar" id="stats-bar"></div></div></header><div class="controls"><input type="text" class="search-box" id="search-input" placeholder="Search by company or job title..."><div class="filter-group" id="filter-group"></div><div class="sort-group"><span class="sort-label">Sort by:</span><select class="sort-select" id="sort-select"><option value="priority">Action Priority</option><option value="newest">Newest First</option><option value="salary">Highest Salary</option><option value="company">Company (A-Z)</option></select></div></div><div class="container"><div class="section"><div class="section-header"><div><div class="section-title">Actionable shortlist</div><div class="section-subtitle">Start here first. Apply-now and tailor-first leads.</div></div><div class="section-subtitle" id="shortlist-count"></div></div><div class="jobs-grid" id="shortlist-grid"></div></div><div class="section"><div class="section-header"><div><div class="section-title">Backlog / previous leads</div><div class="section-subtitle">Still visible, just not front-of-queue.</div></div><div class="section-subtitle" id="backlog-count"></div></div><div class="jobs-grid" id="backlog-grid"></div></div><div class="empty-state" id="empty-state" style="display:none;"><div class="empty-state-icon">🔎</div><div class="empty-state-text">No jobs found</div><div class="empty-state-subtext">Try adjusting your filters or search</div></div></div><script>var jobData={last_updated:'',jobs:[]};var jobs=[];var jobStatuses=JSON.parse(localStorage.getItem('jobStatuses')||'{}');var currentFilter='all';var currentSearch='';var currentSort='priority';var statusOptions=['all','shortlist','backlog','applied','interviewing','offer','rejected','expired'];function init(){fetch('dashboard-data.json?_='+Date.now()).then(function(res){return res.json()}).then(function(data){jobData=data||{last_updated:'',jobs:[]};jobs=(jobData.jobs||[]).map(function(job){return Object.assign({},job,{status:jobStatuses[job.id]||job.status||'new'})});renderToday();renderStats();renderFilters();render()}).catch(function(err){console.error('Failed to load dashboard data',err);jobs=[];renderToday();renderStats();renderFilters();render()})}function renderToday(){var today=new Date();document.getElementById('today-date').textContent=today.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}function renderStats(){var totalJobs=jobs.length;var shortlistCount=jobs.filter(function(j){return (j.decision==='apply_now'||j.decision==='tailor')&&j.status!=='applied'&&j.status!=='rejected'&&j.status!=='expired'}).length;var appliedCount=jobs.filter(function(j){return j.status==='applied'}).length;var backlogCount=jobs.filter(function(j){return j.decision==='skip'||j.status==='backlog'}).length;var interviewingCount=jobs.filter(function(j){return j.status==='interviewing'}).length;var stats=[{label:'Visible Leads',value:totalJobs},{label:'Actionable',value:shortlistCount},{label:'Applied',value:appliedCount},{label:'Backlog',value:backlogCount},{label:'Interviewing',value:interviewingCount}];document.getElementById('stats-bar').innerHTML=stats.map(function(stat){return '<div class="stat-card"><div class="stat-number">'+stat.value+'</div><div class="stat-label">'+stat.label+'</div></div>'}).join('')}function renderFilters(){document.getElementById('filter-group').innerHTML=statusOptions.map(function(option){return '<button class="filter-btn '+(currentFilter===option?'active':'')+'" data-filter="'+option+'">'+option.charAt(0).toUpperCase()+option.slice(1)+'</button>'}).join('');document.querySelectorAll('.filter-btn').forEach(function(btn){btn.addEventListener('click',function(e){currentFilter=e.target.dataset.filter;renderFilters();render()})})}function extractSalary(salaryStr){if(!salaryStr)return 0;var nums=String(salaryStr).replace(/,/g,'').match(/\d+/g);return nums?parseInt(nums[nums.length-1],10):0}function formatDate(dateStr){var date=new Date(dateStr);if(isNaN(date.getTime()))return dateStr||'Unknown';var today=new Date();var yesterday=new Date(today);yesterday.setDate(yesterday.getDate()-1);if(date.toDateString()===today.toDateString())return 'Today';if(date.toDateString()===yesterday.toDateString())return 'Yesterday';return date.toLocaleDateString('en-US',{month:'short',day:'numeric'})}function matchesFilter(job){if(currentFilter==='all')return true;if(currentFilter==='shortlist')return job.decision==='apply_now'||job.decision==='tailor';if(currentFilter==='backlog')return job.decision==='skip'||job.status==='backlog';return job.status===currentFilter}function getFilteredJobs(){var filtered=jobs.filter(function(job){var matchesSearch=currentSearch===''||String(job.company||'').toLowerCase().indexOf(currentSearch.toLowerCase())!==-1||String(job.title||'').toLowerCase().indexOf(currentSearch.toLowerCase())!==-1;return matchesFilter(job)&&matchesSearch});if(currentSort==='newest'){filtered.sort(function(a,b){return new Date(b.date_seen)-new Date(a.date_seen)})}else if(currentSort==='salary'){filtered.sort(function(a,b){return extractSalary(b.salary)-extractSalary(a.salary)})}else if(currentSort==='company'){filtered.sort(function(a,b){return String(a.company||'').localeCompare(String(b.company||''))})}else{var decisionRank={apply_now:0,tailor:1,skip:2};var priorityRank={high:0,medium:1,low:2};filtered.sort(function(a,b){var da=decisionRank[a.decision]??9,db=decisionRank[b.decision]??9;if(da!==db)return da-db;var pa=priorityRank[a.priority]??1,pb=priorityRank[b.priority]??1;if(pa!==pb)return pa-pb;return String(a.company||'').localeCompare(String(b.company||''))})}return filtered}function pill(text,cls){return '<span class="pill '+cls+'">'+text+'</span>'}function renderCard(job){var salaryText=job.salary||'Not listed';var appliedLocked=job.status==='applied'||job.status==='rejected'||job.status==='expired';var tierClass=(job.decision==='apply_now'||job.decision==='tailor')?'pill-shortlist':'pill-backlog';var tierText=(job.decision==='apply_now'||job.decision==='tailor')?'shortlist':'backlog';return '<div class="job-card">'+'<div class="job-card-header">'+'<div class="job-company">'+(job.company||'Unknown Company')+'</div>'+'<div class="job-title">'+(job.title||'Unknown Role')+'</div>'+'</div>'+'<div class="job-meta">'+'<div class="meta-row">'+pill(job.location||'Location not listed','pill-location')+pill(salaryText,job.salary?'pill-salary':'pill-muted')+'</div>'+'<div class="meta-row">'+pill((job.decision||'saved').replace('_',' '),'pill-'+(job.decision||'skip'))+pill(tierText,tierClass)+(job.resumeVariant?pill(job.resumeVariant,'pill-muted'):'')+(job.priority?pill(job.priority,'pill-muted'):'')+'</div>'+'<div class="date-seen">Seen on '+formatDate(job.date_seen)+'</div>'+'</div>'+'<div class="button-group">'+'<a href="'+job.url+'" target="_blank" rel="noopener noreferrer" class="btn btn-view">View Job ↗</a>'+'<button class="btn btn-applied '+(appliedLocked?'disabled':'')+'" data-job-id="'+job.id+'" '+(appliedLocked?'disabled':'')+'>Mark Applied</button>'+'</div>'+'</div>'}function render(){var filtered=getFilteredJobs();var shortlist=filtered.filter(function(job){return job.decision==='apply_now'||job.decision==='tailor'});var backlog=filtered.filter(function(job){return !(job.decision==='apply_now'||job.decision==='tailor')});document.getElementById('shortlist-count').textContent=shortlist.length+' visible';document.getElementById('backlog-count').textContent=backlog.length+' visible';document.getElementById('shortlist-grid').innerHTML=shortlist.map(renderCard).join('');document.getElementById('backlog-grid').innerHTML=backlog.map(renderCard).join('');var empty=(shortlist.length===0&&backlog.length===0);document.getElementById('empty-state').style.display=empty?'block':'none';document.querySelectorAll('.btn-applied:not(.disabled)').forEach(function(btn){btn.addEventListener('click',function(e){var jobId=e.target.dataset.jobId;jobStatuses[jobId]='applied';localStorage.setItem('jobStatuses',JSON.stringify(jobStatuses));jobs=jobs.map(function(j){return j.id===jobId?Object.assign({},j,{status:'applied'}):j});renderStats();render()})})}document.getElementById('search-input').addEventListener('input',function(e){currentSearch=e.target.value;render()});document.getElementById('sort-select').addEventListener('change',function(e){currentSort=e.target.value;render()});init();</script></body></html>
