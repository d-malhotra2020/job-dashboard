<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Job Hunt Dashboard</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"><style> * {margin:0;padding:0;box-sizing:border-box;} body {font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f13;color:#e4e4e7;line-height:1.6;overflow-x:hidden;} /* Scrollbar styling */ ::-webkit-scrollbar {width:8px;height:8px;} ::-webkit-scrollbar-track {background:#1a1a24;} ::-webkit-scrollbar-thumb {background:#4f8ef7;border-radius:4px;} ::-webkit-scrollbar-thumb:hover {background:#3d7ae4;} /* Header */ header {background:linear-gradient(135deg,#0f0f13 0%,#1a1a24 100%);border-bottom:1px solid rgba(79,142,247,0.1);padding:2rem 1rem;text-align:center;position:sticky;top:0;z-index:100;} .header-container {max-width:1400px;margin:0 auto;} .header-top {display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;margin-bottom:0.5rem;} .header-title h1 {font-size:2rem;font-weight:700;color:#fff;letter-spacing:-0.02em;} .header-title p {font-size:0.875rem;color:#a1a1a6;margin-top:0.25rem;} .header-date {font-size:0.875rem;color:#a1a1a6;background:rgba(79,142,247,0.08);padding:0.5rem 1rem;border-radius:0.5rem;border:1px solid rgba(79,142,247,0.15);} /* Stats Bar */ .stats-bar {display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-top:1.5rem;} .stat-card {background:rgba(79,142,247,0.08);border:1px solid rgba(79,142,247,0.15);border-radius:0.75rem;padding:1rem;text-align:center;transition:all 0.3s ease;} .stat-card:hover {background:rgba(79,142,247,0.12);border-color:rgba(79,142,247,0.25);transform:translateY(-2px);} .stat-number {font-size:1.875rem;font-weight:700;color:#4f8ef7;margin-bottom:0.25rem;} .stat-label {font-size:0.75rem;color:#a1a1a6;text-transform:uppercase;letter-spacing:0.05em;font-weight:500;} /* Filter & Search Section */ .controls {max-width:1400px;margin:2rem auto 0;padding:0 1rem;} .search-box {width:100%;padding:0.875rem 1rem;background:#1a1a24;border:1px solid rgba(79,142,247,0.15);border-radius:0.75rem;color:#e4e4e7;font-family:'Inter',sans-serif;font-size:0.95rem;margin-bottom:1.5rem;transition:all 0.3s ease;} .search-box:focus {outline:none;border-color:#4f8ef7;background:rgba(79,142,247,0.05);box-shadow:0 0 0 3px rgba(79,142,247,0.1);} .search-box::placeholder {color:#71717a;} /* Filter Buttons */ .filter-group {display:flex;flex-wrap:wrap;gap:0.75rem;margin-bottom:1.5rem;} .filter-btn {padding:0.625rem 1rem;background:transparent;border:1px solid rgba(79,142,247,0.25);border-radius:0.5rem;color:#a1a1a6;font-family:'Inter',sans-serif;font-size:0.875rem;font-weight:500;cursor:pointer;transition:all 0.3s ease;white-space:nowrap;} .filter-btn:hover {border-color:#4f8ef7;color:#4f8ef7;} .filter-btn.active {background:#4f8ef7;border-color:#4f8ef7;color:#fff;} /* Sort Dropdown */ .sort-group {display:flex;gap:0.75rem;align-items:center;margin-bottom:1.5rem;} .sort-label {font-size:0.875rem;color:#a1a1a6;font-weight:500;} .sort-select {padding:0.625rem 0.75rem;background:#1a1a24;border:1px solid rgba(79,142,247,0.15);border-radius:0.5rem;color:#e4e4e7;font-family:'Inter',sans-serif;font-size:0.875rem;cursor:pointer;transition:all 0.3s ease;} .sort-select:hover,.sort-select:focus {border-color:#4f8ef7;outline:none;background:rgba(79,142,247,0.05);} /* Main Container */ .container {max-width:1400px;margin:0 auto;padding:2rem 1rem;} /* Jobs Grid */ .jobs-grid {display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:1.5rem;margin-top:2rem;} @media (max-width:768px) {.jobs-grid {grid-template-columns:1fr;} .header-title h1 {font-size:1.5rem;} .stats-bar {grid-template-columns:1fr 1fr;}} /* Job Card */ .job-card {background:#1a1a24;border:1px solid rgba(79,142,247,0.1);border-radius:0.875rem;padding:1.5rem;transition:all 0.3s ease;display:flex;flex-direction:column;overflow:hidden;position:relative;} .job-card::before {content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#4f8ef7,transparent);opacity:0;transition:opacity 0.3s ease;} .job-card:hover {border-color:#4f8ef7;background:rgba(79,142,247,0.05);transform:translateY(-4px);box-shadow:0 10px 30px rgba(79,142,247,0.15);} .job-card:hover::before {opacity:1;} .job-card-header {margin-bottom:1rem;} .job-company {font-size:0.75rem;color:#4f8ef7;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.5rem;} .job-title {font-size:1.125rem;font-weight:600;color:#fff;margin-bottom:0.75rem;line-height:1.4;} .job-meta {display:flex;flex-direction:column;gap:0.5rem;margin-bottom:1rem;} .meta-item {display:flex;align-items:center;gap:0.5rem;font-size:0.875rem;color:#a1a1a6;} .meta-item strong {color:#e4e4e7;} .location-badge {display:inline-flex;align-items:center;background:rgba(79,142,247,0.1);color:#4f8ef7;padding:0.375rem 0.75rem;border-radius:0.375rem;font-size:0.8rem;font-weight:500;width:fit-content;} .salary {color:#10b981;font-weight:500;} .salary-not-listed {color:#71717a;font-style:italic;} /* Status Badge */ .status-badge {display:inline-flex;align-items:center;padding:0.5rem 0.875rem;border-radius:0.5rem;font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin:1rem 0;width:fit-content;} .status-new {background:rgba(79,142,247,0.15);color:#4f8ef7;} .status-applied {background:rgba(234,179,8,0.15);color:#eab308;} .status-interviewing {background:rgba(16,185,129,0.15);color:#10b981;} .status-offer {background:rgba(168,85,247,0.15);color:#a855f7;} .status-rejected {background:rgba(239,68,68,0.15);color:#ef4444;} .status-expired {background:rgba(113,113,122,0.15);color:#71717a;} .job-card.expired-card {opacity:0.55;filter:grayscale(0.4);} .job-card.expired-card:hover {opacity:0.75;filter:grayscale(0.2);border-color:#52525b;box-shadow:none;} .job-card.expired-card::before {background:linear-gradient(90deg,transparent,#52525b,transparent);} /* Button Group */ .button-group {display:flex;gap:0.75rem;margin-top:auto;} .btn {flex:1;padding:0.75rem 1rem;border:none;border-radius:0.5rem;font-family:'Inter',sans-serif;font-size:0.875rem;font-weight:500;cursor:pointer;transition:all 0.3s ease;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:0.5rem;} .btn-view {background:#4f8ef7;color:#fff;} .btn-view:hover {background:#3d7ae4;transform:translateY(-2px);box-shadow:0 4px 12px rgba(79,142,247,0.3);} .btn-applied {background:transparent;border:1px solid rgba(79,142,247,0.3);color:#4f8ef7;} .btn-applied:hover {background:rgba(79,142,247,0.1);border-color:#4f8ef7;} .btn-applied.disabled {opacity:0.5;cursor:not-allowed;} /* Empty State */ .empty-state {text-align:center;padding:3rem 1rem;color:#a1a1a6;} .empty-state-icon {font-size:3rem;margin-bottom:1rem;opacity:0.5;} .empty-state-text {font-size:1.125rem;margin-bottom:0.5rem;} .empty-state-subtext {font-size:0.875rem;color:#71717a;} /* Animations */ @keyframes fadeIn {from {opacity:0;transform:translateY(10px);} to {opacity:1;transform:translateY(0);}} .job-card {animation:fadeIn 0.4s ease-out;} /* Date formatting */ .date-seen {color:#71717a;font-size:0.8rem;} /* Responsive adjustments */ @media (max-width:640px) {header {padding:1.5rem 1rem;} .header-title h1 {font-size:1.375rem;} .header-top {flex-direction:column;align-items:stretch;text-align:center;} .container {padding:1rem;} .filter-group {gap:0.5rem;} .filter-btn {flex:1;min-width:70px;font-size:0.75rem;padding:0.5rem 0.75rem;} .button-group {flex-direction:column;} .btn {width:100%;}} </style></head><body><header><div class="header-container"><div class="header-top"><div class="header-title"><h1>Drew Malhotra</h1><p>Job Hunt Dashboard</p></div><div class="header-date" id="today-date"></div></div><div class="stats-bar" id="stats-bar"></div></div></header><div class="controls"><input type="text" class="search-box" id="search-input" placeholder="Search by company or job title..." ><div class="filter-group" id="filter-group"></div><div class="sort-group"><span class="sort-label">Sort by:</span><select class="sort-select" id="sort-select"><option value="newest">Newest First</option><option value="salary">Highest Salary</option><option value="company">Company (A-Z)</option></select></div></div><div class="container"><div class="jobs-grid" id="jobs-grid"></div><div class="empty-state" id="empty-state" style="display:none;"><div class="empty-state-icon">🔍</div><div class="empty-state-text">No jobs found</div><div class="empty-state-subtext">Try adjusting your filters or search</div></div></div><script> // Embedded job data const jobData = {"last_updated":"2026-04-07","jobs":[ {"id":"crowdstrike-sr-sdet-ii-ng-siem","title":"Sr. SDET II - NG-SIEM","company":"CrowdStrike","salary":"$155,000 - $255,000","location":"Remote (East Coast US)","url":"https://jobs.accel.com/companies/crowdstrike/jobs/41858099-sr-sdet-ng-siem-remote-east-coast","date_seen":"2026-04-06","status":"expired"},{"id":"crowdstrike-sr-sdet-ng-siem","title":"Sr. SDET - NG-SIEM","company":"CrowdStrike","salary":"$135,000 - $210,000","location":"Remote (East Coast US)","url":"https://builtin.com/job/sr-sdet-ii-ng-siem-remote-east-coast/3670322","date_seen":"2026-04-06","status":"expired"},{"id":"quanata-senior-sdet-data-qa","title":"Senior SDET,Data QA","company":"Quanata","salary":"$185,000 - $265,000","location":"Remote (US)","url":"https://www.remoterocketship.com/company/quanata/jobs/senior-sdet-data-qa-united-states-remote/","date_seen":"2026-04-06","status":"expired"},{"id":"quanata-senior-sdet","title":"Senior SDET","company":"Quanata","salary":null,"location":"Remote (US)","url":"https://boards.greenhouse.io/quanata/jobs/5159154004","date_seen":"2026-04-06","status":"expired"},{"id":"apollo-io-senior-sdet","title":"Senior SDET","company":"Apollo.io","salary":null,"location":"Remote (Global)","url":"https://boards.greenhouse.io/apolloio/jobs/5189009004","date_seen":"2026-04-06","status":"expired"},{"id":"quanata-sdet-back-end","title":"SDET,Back End","company":"Quanata","salary":null,"location":"Remote (US)","url":"https://job-boards.greenhouse.io/quanata/jobs/5752862004","date_seen":"2026-04-06","status":"active"},{"id":"netflix-sdet-5-tv-web-player","title":"Software Development Engineer in Test 5 - TV & Web Player Platform","company":"Netflix","salary":"$150,000 - $300,000 est.","location":"Remote (USA)","url":"https://explore.jobs.netflix.net/careers/job/790304215698-software-development-engineer-in-test-5-tv-web-player-platform-usa-remote","date_seen":"2026-04-06","status":"expired"},{"id":"rapidfort-sr-sdet-python","title":"Sr. SDET / Sr. QA Automation Engineer (Python)","company":"RapidFort","salary":"$120,000 - $180,000","location":"Remote (US)","url":"https://www.remoterocketship.com/us/company/rapidfort/jobs/senior-sdet-sr-qa-automation-engineer-python-cli-ci-cd-containers-united-states-remote/","date_seen":"2026-04-06","status":"active"},{"id":"cyware-sdet-python","title":"SDET - Python","company":"Cyware","salary":null,"location":"Remote (USA)","url":"https://boards.greenhouse.io/cyware/jobs/5794592003","date_seen":"2026-04-06","status":"expired"},{"id":"bobsled-senior-sdet","title":"Senior Software Development Engineer in Test","company":"Bobsled","salary":null,"location":"Remote (Global)","url":"https://boards.greenhouse.io/bobsledinc/jobs/4385159005","date_seen":"2026-04-06","status":"expired"},{"id":"airbnb-staff-automation-engineer","title":"Staff Automation Engineer,Quality Engineering","company":"Airbnb","salary":null,"location":"Remote (US)","url":"https://careers.airbnb.com/positions/6669384/","date_seen":"2026-04-06","status":"expired"},{"id":"airbnb-senior-ios-automation","title":"Senior iOS Automation Engineer","company":"Airbnb","salary":null,"location":"Remote (US)","url":"https://careers.airbnb.com/positions/7453190/","date_seen":"2026-04-06","status":"active"},{"id":"airbnb-senior-android-qa","title":"Senior Android Software Engineer,Quality Engineering","company":"Airbnb","salary":null,"location":"Remote (US)","url":"https://careers.airbnb.com/positions/6602436/","date_seen":"2026-04-06","status":"active"},{"id":"reveleer-sdet","title":"Software Development Engineer in Test","company":"Reveleer","salary":"$130,000 - $150,000","location":"Remote (US)","url":"https://jobs.upfront.com/companies/reveleer/jobs/60312964-software-development-engineer-in-test-sdet","date_seen":"2026-04-06","status":"active"},{"id":"lastpass-senior-sdet","title":"Senior Software Engineer,SDET","company":"LastPass","salary":null,"location":"Remote","url":"https://boards.greenhouse.io/lastpass/jobs/4376661005","date_seen":"2026-04-06","status":"expired"},{"id":"vgs-staff-sdet","title":"Staff SDET","company":"VGS (Very Good Security)","salary":"$150,000–$200,000","location":"Remote,US","url":"https://www.linkedin.com/jobs/view/staff-sdet-at-vgs-3550782736","date_seen":"2026-04-07","status":"expired"},{"id":"flex-senior-sdet-4651948005","title":"Senior Software Development Engineer in Test (SDET)","company":"Flex","salary":"$142,000–$155,000 (most states) / $158,000–$172,000 (CA/NY/NJ)","location":"Remote,US","url":"https://job-boards.greenhouse.io/flex/jobs/4651948005","date_seen":"2026-04-07","status":"expired"},{"id":"flex-senior-sdet-4655636005","title":"Senior Software Development Engineer in Test (SDET) [2nd opening]","company":"Flex","salary":"$142,000–$155,000 (most states) / $158,000–$172,000 (CA/NY/NJ)","location":"Remote,US","url":"https://job-boards.greenhouse.io/flex/jobs/4655636005","date_seen":"2026-04-07","status":"active"},{"id":"halcyon-cloud-test-automation-engineer","title":"Cloud Test Automation Engineer","company":"Halcyon","salary":"$140,000–$175,000 + 10% bonus + equity","location":"Remote","url":"https://job-boards.greenhouse.io/halcyon/jobs/5808645004","date_seen":"2026-04-07","status":"expired"},{"id":"cribl-staff-sdet","title":"Staff Software Development Engineer in Test (SDET)","company":"Cribl","salary":"Not disclosed","location":"Remote,US","url":"https://job-boards.greenhouse.io/cribl/jobs/5764913004","date_seen":"2026-04-07","status":"expired"},{"id":"netflix-senior-test-engineer-l5-games","title":"Senior Test Engineer (L5) – Games Platform Quality","company":"Netflix","salary":"$170,000–$720,000","location":"Remote,US","url":"https://remotegamejobs.com/jobs/netflix-test-engineer-l5-cloud-games-sdk-remote-job","date_seen":"2026-04-07","status":"expired"},{"id":"stripe-staff-swe-terminal-dev-productivity","title":"Staff Software Engineer,Terminal Developer Productivity","company":"Stripe","salary":"$224,000–$336,000","location":"Remote,US","url":"https://stripe.com/jobs/listing/staff-software-engineer-terminal-developer-productivity/7705412","date_seen":"2026-04-07","status":"active"},{"id":"airbnb-senior-swe-quality-payments","title":"Senior Software Engineer (Quality),Payments","company":"Airbnb","salary":null,"location":"Remote-Eligible,US","url":"https://careers.airbnb.com/positions/7668022/","date_seen":"2026-04-07","status":"active"},{"id":"pokemon-sdet-level-3","title":"Software Development Engineer in Test (SDET) – Level 3","company":"The Pokémon Company International","salary":"$127,850–$194,000","location":"Remote,US","url":"https://job-boards.greenhouse.io/pokemoncareers/jobs/7331547003","date_seen":"2026-04-07","status":"expired"},{"id":"knowbe4-qa-lead-saas","title":"Automated Testing / QA Lead – SaaS Ecosystem","company":"KnowBe4","salary":"$120,000–$140,000","location":"Remote","url":"https://job-boards.greenhouse.io/knowbe4/jobs/8402290002","date_seen":"2026-04-07","status":"active"} ]};// Initialize state let jobs = [];let jobStatuses = {};// Store status changes in memory let currentFilter = 'all';let currentSearch = '';let currentSort = 'newest';// Status options for filtering const statusOptions = ['all','new','applied','interviewing','offer','rejected','expired'];// Initialize the dashboard function init() {// Add status field to jobs (default to 'new') jobs = jobData.jobs.map(job => ({...job,status:jobStatuses[job.id] || job.status || 'new'}));renderToday();renderStats();renderFilters();render();} // Format today's date function renderToday() {const today = new Date();const options = {year:'numeric',month:'long',day:'numeric'};const dateStr = today.toLocaleDateString('en-US',options);document.getElementById('today-date').textContent = dateStr;} // Calculate and render stats function renderStats() {const totalJobs = jobs.length;const activeCount = jobs.filter(j => j.status !== 'expired').length;const appliedCount = jobs.filter(j => j.status === 'applied').length;const interviewingCount = jobs.filter(j => j.status === 'interviewing').length;const expiredCount = jobs.filter(j => j.status === 'expired').length;const stats = [ {label:'Total Found',value:totalJobs},{label:'Still Active',value:activeCount},{label:'Applied',value:appliedCount},{label:'Interviewing',value:interviewingCount} ];const statsBar = document.getElementById('stats-bar');statsBar.innerHTML = stats.map(stat => ` <div class="stat-card"><div class="stat-number">${stat.value}</div><div class="stat-label">${stat.label}</div></div> `).join('');} // Render filter buttons function renderFilters() {const filterGroup = document.getElementById('filter-group');filterGroup.innerHTML = statusOptions.map(option => ` <button class="filter-btn ${currentFilter === option ? 'active' :''}" data-filter="${option}" > ${option.charAt(0).toUpperCase() + option.slice(1)} </button> `).join('');// Add click handlers document.querySelectorAll('.filter-btn').forEach(btn => {btn.addEventListener('click',(e) => {currentFilter = e.target.dataset.filter;renderFilters();render();});});} // Filter jobs based on current criteria function getFilteredJobs() {let filtered = jobs.filter(job => {const matchesFilter = currentFilter === 'all' || job.status === currentFilter;const matchesSearch = currentSearch === '' || job.company.toLowerCase().includes(currentSearch.toLowerCase()) || job.title.toLowerCase().includes(currentSearch.toLowerCase());return matchesFilter && matchesSearch;});// Sort if (currentSort === 'newest') {filtered.sort((a,b) => new Date(b.date_seen) - new Date(a.date_seen));} else if (currentSort === 'salary') {filtered.sort((a,b) => {const salaryA = extractSalary(a.salary);const salaryB = extractSalary(b.salary);return salaryB - salaryA;});} else if (currentSort === 'company') {filtered.sort((a,b) => a.company.localeCompare(b.company));} return filtered;} // Extract max salary from range function extractSalary(salaryStr) {if (!salaryStr) return 0;const nums = salaryStr.match(/\d+/g);return nums ? parseInt(nums[nums.length - 1]) * 1000 :0;} // Get status badge class function getStatusClass(status) {return `status-${status}`;} // Format date function formatDate(dateStr) {const date = new Date(dateStr);const today = new Date();const yesterday = new Date(today);yesterday.setDate(yesterday.getDate() - 1);if (date.toDateString() === today.toDateString()) {return 'Today';} else if (date.toDateString() === yesterday.toDateString()) {return 'Yesterday';} else {return date.toLocaleDateString('en-US',{month:'short',day:'numeric'});}} // Render job cards function render() {const filtered = getFilteredJobs();const grid = document.getElementById('jobs-grid');const emptyState = document.getElementById('empty-state');if (filtered.length === 0) {grid.innerHTML = '';emptyState.style.display = 'block';return;} emptyState.style.display = 'none';grid.innerHTML = filtered.map(job => ` <div class="job-card ${job.status === 'expired' ? 'expired-card' :''}" data-job-id="${job.id}"><div class="job-card-header"><div class="job-company">${job.company}</div><div class="job-title">${job.title}</div></div><div class="job-meta"><div class="meta-item"><strong class="salary${job.salary ? '' :'-not-listed'}"> ${job.salary || 'Not listed'} </strong></div><div class="location-badge">${job.location}</div><div class="date-seen">Seen on ${formatDate(job.date_seen)}</div></div><div class="status-badge ${getStatusClass(job.status)}"> ${job.status === 'expired' ? '✕ Expired' :job.status} </div><div class="button-group"><a href="${job.url}" target="_blank" rel="noopener noreferrer" class="btn btn-view" style="${job.status === 'expired' ? 'background:#3f3f46;' :''}"> View Job ↗ </a> ${job.status === 'expired' ? '' :`<button class="btn btn-applied ${job.status !== 'new' ? 'disabled' :''}" data-job-id="${job.id}" ${job.status !== 'new' ? 'disabled' :''} > Mark Applied </button>`} </div></div> `).join('');// Add event listeners for "Mark Applied" buttons document.querySelectorAll('.btn-applied:not(.disabled)').forEach(btn => {btn.addEventListener('click',(e) => {const jobId = e.target.dataset.jobId.jobStatuses[jobId] = 'applied';jobs = jobs.map(j => j.id === jobId ? {...j,status:'applied'} :j);renderStats();render();});});} // Search functionality document.getElementById('search-input').addEventListener('input',(e) => {currentSearch = e.target.value;render();});// Sort functionality document.getElementById('sort-select').addEventListener('change',(e) => {currentSort = e.target.value;render();});// Initialize on page load init();</script></body></html>
