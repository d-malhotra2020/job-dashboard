<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Job Hunt Dashboard</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"><style> * {margin:0;padding:0;box-sizing:border-box;} body {font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f13;color:#e4e4e7;line-height:1.6;overflow-x:hidden;} ::-webkit-scrollbar {width:8px;height:8px;} ::-webkit-scrollbar-track {background:#1a1a24;} ::-webkit-scrollbar-thumb {background:#4f8ef7;border-radius:4px;} ::-webkit-scrollbar-thumb:hover {background:#3d7ae4;} header {background:linear-gradient(135deg,#0f0f13 0%,#1a1a24 100%);border-bottom:1px solid rgba(79,142,247,0.1);padding:2rem 1rem;text-align:center;position:sticky;top:0;z-index:100;} .header-container {max-width:1400px;margin:0 auto;} .header-top {display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;margin-bottom:0.5rem;} .header-title h1 {font-size:2rem;font-weight:700;color:#fff;letter-spacing:-0.02em;} .header-title p {font-size:0.875rem;color:#a1a1a6;margin-top:0.25rem;} .header-date {font-size:0.875rem;color:#a1a1a6;background:rgba(79,142,247,0.08);padding:0.5rem 1rem;border-radius:0.5rem;border:1px solid rgba(79,142,247,0.15);} .stats-bar {display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-top:1.5rem;} .stat-card {background:rgba(79,142,247,0.08);border:1px solid rgba(79,142,247,0.15);border-radius:0.75rem;padding:1rem;text-align:center;transition:all 0.3s ease;} .stat-card:hover {background:rgba(79,142,247,0.12);border-color:rgba(79,142,247,0.25);transform:translateY(-2px);} .stat-number {font-size:1.875rem;font-weight:700;color:#4f8ef7;margin-bottom:0.25rem;} .stat-label {font-size:0.75rem;color:#a1a1a6;text-transform:uppercase;letter-spacing:0.05em;font-weight:500;} .controls {max-width:1400px;margin:2rem auto 0;padding:0 1rem;} .search-box {width:100%;padding:0.875rem 1rem;background:#1a1a24;border:1px solid rgba(79,142,247,0.15);border-radius:0.75rem;color:#e4e4e7;font-family:'Inter',sans-serif;font-size:0.95rem;margin-bottom:1.5rem;transition:all 0.3s ease;} .search-box:focus {outline:none;border-color:#4f8ef7;background:rgba(79,142,247,0.05);box-shadow:0 0 0 3px rgba(79,142,247,0.1);} .search-box::placeholder {color:#71717a;} .filter-group {display:flex;flex-wrap:wrap;gap:0.75rem;margin-bottom:1.5rem;} .filter-btn {padding:0.625rem 1rem;background:transparent;border:1px solid rgba(79,142,247,0.25);border-radius:0.5rem;color:#a1a1a6;font-family:'Inter',sans-serif;font-size:0.875rem;font-weight:500;cursor:pointer;transition:all 0.3s ease;white-space:nowrap;} .filter-btn:hover {border-color:#4f8ef7;color:#4f8ef7;} .filter-btn.active {background:#4f8ef7;border-color:#4f8ef7;color:#fff;} .sort-group {display:flex;gap:0.75rem;align-items:center;margin-bottom:1.5rem;} .sort-label {font-size:0.875rem;color:#a1a1a6;font-weight:500;} .sort-select {padding:0.625rem 0.75rem;background:#1a1a24;border:1px solid rgba(79,142,247,0.15);border-radius:0.5rem;color:#e4e4e7;font-family:'Inter',sans-serif;font-size:0.875rem;cursor:pointer;transition:all 0.3s ease;} .sort-select:hover,.sort-select:focus {border-color:#4f8ef7;outline:none;background:rgba(79,142,247,0.05);} .container {max-width:1400px;margin:0 auto;padding:2rem 1rem;} .jobs-grid {display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:1.5rem;margin-top:2rem;} @media (max-width:768px) {.jobs-grid {grid-template-columns:1fr;} .header-title h1 {font-size:1.5rem;} .stats-bar {grid-template-columns:1fr 1fr;}} .job-card {background:#1a1a24;border:1px solid rgba(79,142,247,0.1);border-radius:0.875rem;padding:1.5rem;transition:all 0.3s ease;display:flex;flex-direction:column;overflow:hidden;position:relative;} .job-card::before {content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#4f8ef7,transparent);opacity:0;transition:opacity 0.3s ease;} .job-card:hover {border-color:#4f8ef7;background:rgba(79,142,247,0.05);transform:translateY(-4px);box-shadow:0 10px 30px rgba(79,142,247,0.15);} .job-card:hover::before {opacity:1;} .job-card-header {margin-bottom:1rem;} .job-company {font-size:0.75rem;color:#4f8ef7;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.5rem;} .job-title {font-size:1.125rem;font-weight:600;color:#fff;margin-bottom:0.75rem;line-height:1.4;} .job-meta {display:flex;flex-direction:column;gap:0.5rem;margin-bottom:1rem;} .meta-item {display:flex;align-items:center;gap:0.5rem;font-size:0.875rem;color:#a1a1a6;} .meta-item strong {color:#e4e4e7;} .location-badge {display:inline-flex;align-items:center;background:rgba(79,142,247,0.1);color:#4f8ef7;padding:0.375rem 0.75rem;border-radius:0.375rem;font-size:0.8rem;font-weight:500;width:fit-content;} .salary {color:#10b981;font-weight:500;} .salary-not-listed {color:#71717a;font-style:italic;} .status-badge {display:inline-flex;align-items:center;padding:0.5rem 0.875rem;border-radius:0.5rem;font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin:1rem 0;width:fit-content;} .status-new {background:rgba(79,142,247,0.15);color:#4f8ef7;} .status-applied {background:rgba(234,179,8,0.15);color:#eab308;} .status-interviewing {background:rgba(16,185,129,0.15);color:#10b981;} .status-offer {background:rgba(168,85,247,0.15);color:#a855f7;} .status-rejected {background:rgba(239,68,68,0.15);color:#ef4444;} .status-expired {background:rgba(113,113,122,0.15);color:#71717a;} .job-card.expired-card {opacity:0.55;filter:grayscale(0.4);} .job-card.expired-card:hover {opacity:0.75;filter:grayscale(0.2);border-color:#52525b;box-shadow:none;} .job-card.expired-card::before {background:linear-gradient(90deg,transparent,#52525b,transparent);} .button-group {display:flex;gap:0.75rem;margin-top:auto;} .btn {flex:1;padding:0.75rem 1rem;border:none;border-radius:0.5rem;font-family:'Inter',sans-serif;font-size:0.875rem;font-weight:500;cursor:pointer;transition:all 0.3s ease;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:0.5rem;} .btn-view {background:#4f8ef7;color:#fff;} .btn-view:hover {background:#3d7ae4;transform:translateY(-2px);box-shadow:0 4px 12px rgba(79,142,247,0.3);} .btn-applied {background:transparent;border:1px solid rgba(79,142,247,0.3);color:#4f8ef7;} .btn-applied:hover {background:rgba(79,142,247,0.1);border-color:#4f8ef7;} .btn-applied.disabled {opacity:0.5;cursor:not-allowed;} .empty-state {text-align:center;padding:3rem 1rem;color:#a1a1a6;} .empty-state-icon {font-size:3rem;margin-bottom:1rem;opacity:0.5;} .empty-state-text {font-size:1.125rem;margin-bottom:0.5rem;} .empty-state-subtext {font-size:0.875rem;color:#71717a;} @keyframes fadeIn {from {opacity:0;transform:translateY(10px);} to {opacity:1;transform:translateY(0);}} .job-card {animation:fadeIn 0.4s ease-out;} .date-seen {color:#71717a;font-size:0.8rem;} @media (max-width:640px) {header {padding:1.5rem 1rem;} .header-title h1 {font-size:1.375rem;} .header-top {flex-direction:column;align-items:stretch;text-align:center;} .container {padding:1rem;} .filter-group {gap:0.5rem;} .filter-btn {flex:1;min-width:70px;font-size:0.75rem;padding:0.5rem 0.75rem;} .button-group {flex-direction:column;} .btn {width:100%;}} </style></head><body><header><div class="header-container"><div class="header-top"><div class="header-title"><h1>Drew Malhotra</h1><p>Job Hunt Dashboard</p></div><div class="header-date" id="today-date"></div></div><div class="stats-bar" id="stats-bar"></div></div></header><div class="controls"><input type="text" class="search-box" id="search-input" placeholder="Search by company or job title..." ><div class="filter-group" id="filter-group"></div><div class="sort-group"><span class="sort-label">Sort by:</span><select class="sort-select" id="sort-select"><option value="newest">Newest First</option><option value="salary">Highest Salary</option><option value="company">Company (A-Z)</option></select></div></div><div class="container"><div class="jobs-grid" id="jobs-grid"></div><div class="empty-state" id="empty-state" style="display:none;"><div class="empty-state-icon">&#128269;</div><div class="empty-state-text">No jobs found</div><div class="empty-state-subtext">Try adjusting your filters or search</div></div></div><script>

"company":"Stripe","salary":"$224,000\u2013$336,000","location":"Remote,US","url":"https://stripe.com/jobs/listing/staff-software-engineer-terminal-developer-productivity/7705412","date_seen":"2026-04-07","status":"active"},{"id":"airbnb-senior-swe-quality-payments","title":"Senior Software Engineer (Quality),Payments","company":"Airbnb","salary":null,"location":"Remote-Eligible,US","url":"https://careers.airbnb.com/positions/7668022/","date_seen":"2026-04-07","status":"active"},{"id":"pokemon-sdet-level-3","title":"Software Development Engineer in Test (SDET) \u2013 Level 3","company":"The Pok\u00e9mon Company International","salary":"$127,850\u2013$194,000","location":"Remote,US","url":"https://job-boards.greenhouse.io/pokemoncareers/jobs/7331547003","date_seen":"2026-04-07","status":"expired"},{"id":"knowbe4-qa-lead-saas","title":"Automated Testing / QA Lead \u2013 SaaS Ecosystem","company":"KnowBe4","salary":"$120,000\u2013$140,000","location":"Remote","url":"https://job-boards.greenhouse.io/knowbe4/jobs/8402290002","date_seen":"2026-04-07","status":"active"}]};
var jobs = [];
var jobStatuses = {};
var currentFilter = 'all';
var currentSearch = '';
var currentSort = 'newest';
var statusOptions = ['all','new','applied','interviewing','offer','rejected','expired'];
function init() {
  jobs = jobData.jobs.map(function(job) {
    return Object.assign({}, job, {status: jobStatuses[job.id] || job.status || 'new'});
  });
  renderToday();
  renderStats();
  renderFilters();
  render();
}
function renderToday() {
  var today = new Date();
  var options = {year:'numeric',month:'long',day:'numeric'};
  document.getElementById('today-date').textContent = today.toLocaleDateString('en-US',options);
}
function renderStats() {
  var totalJobs = jobs.length;
  var activeCount = jobs.filter(function(j){return j.status !== 'expired';}).length;
  var appliedCount = jobs.filter(function(j){return j.status === 'applied';}).length;
  var interviewingCount = jobs.filter(function(j){return j.status === 'interviewing';}).length;
  var stats = [{label:'Total Found',value:totalJobs},{label:'Still Active',value:activeCount},{label:'Applied',value:appliedCount},{label:'Interviewing',value:interviewingCount}];
  document.getElementById('stats-bar').innerHTML = stats.map(function(stat) {
    return '<div class="stat-card"><div class="stat-number">' + stat.value + '</div><div class="stat-label">' + stat.label + '</div></div>';
  }).join('');
}
function renderFilters() {
  document.getElementById('filter-group').innerHTML = statusOptions.map(function(option) {
    return '<button class="filter-btn ' + (currentFilter === option ? 'active' : '') + '" data-filter="' + option + '">' + option.charAt(0).toUpperCase() + option.slice(1) + '</button>';
  }).join('');
  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      currentFilter = e.target.dataset.filter;
      renderFilters();
      render();
    });
  });
}
function getFilteredJobs() {
  var filtered = jobs.filter(function(job) {
    var matchesFilter = currentFilter === 'all' || job.status === currentFilter;
    var matchesSearch = currentSearch === '' || job.company.toLowerCase().indexOf(currentSearch.toLowerCase()) !== -1 || job.title.toLowerCase().indexOf(currentSearch.toLowerCase()) !== -1;
    return matchesFilter && matchesSearch;
  });
  if (currentSort === 'newest') {
    filtered.sort(function(a,b){return new Date(b.date_seen) - new Date(a.date_seen);});
  } else if (currentSort === 'salary') {
    filtered.sort(function(a,b){return extractSalary(b.salary) - extractSalary(a.salary);});
  } else if (currentSort === 'company') {
    filtered.sort(function(a,b){return a.company.localeCompare(b.company);});
  }
  return filtered;
}
function extractSalary(salaryStr) {
  if (!salaryStr) return 0;
  var nums = salaryStr.match(/\d+/g);
  return nums ? parseInt(nums[nums.length - 1]) * 1000 : 0;
}
function getStatusClass(status) {
  return 'status-' + status;
}
function formatDate(dateStr) {
  var date = new Date(dateStr);
  var today = new Date();
  var yesterday = new Date(today);
  yesterday.setDate(yesterday.getDate() - 1);
  if (date.toDateString() === today.toDateString()) { return 'Today'; }
  else if (date.toDateString() === yesterday.toDateString()) { return 'Yesterday'; }
  else { return date.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
}
function render() {
  var filtered = getFilteredJobs();
  var grid = document.getElementById('jobs-grid');
  var emptyState = document.getElementById('empty-state');
  if (filtered.length === 0) {
    grid.innerHTML = '';
    emptyState.style.display = 'block';
    return;
  }
  emptyState.style.display = 'none';
  grid.innerHTML = filtered.map(function(job) {
    var isExpired = job.status === 'expired';
    var cardClass = 'job-card' + (isExpired ? ' expired-card' : '');
    var salaryClass = job.salary ? 'salary' : 'salary-not-listed';
    var salaryText = job.salary || 'Not listed';
    var viewStyle = isExpired ? 'background:#3f3f46;' : '';
    var statusText = isExpired ? '\u2715 Expired' : job.status;
    var canApply = job.status === 'new' || job.status === 'active';
    var markAppliedBtn = isExpired ? '' : '<button class="btn btn-applied ' + (canApply ? '' : 'disabled') + '" data-job-id="' + job.id + '" ' + (canApply ? '' : 'disabled') + '>Mark Applied</button>';
    return '<div class="' + cardClass + '" data-job-id="' + job.id + '">' +
      '<div class="job-card-header">' +
      '<div class="job-company">' + job.company + '</div>' +
      '<div class="job-title">' + job.title + '</div>' +
      '</div>' +
      '<div class="job-meta">' +
      '<div class="meta-item"><strong class="' + salaryClass + '">' + salaryText + '</strong></div>' +
      '<div class="location-badge">' + job.location + '</div>' +
      '<div class="date-seen">Seen on ' + formatDate(job.date_seen) + '</div>' +
      '</div>' +
      '<div class="status-badge ' + getStatusClass(job.status) + '">' + statusText + '</div>' +
      '<div class="button-group">' +
      '<a href="' + job.url + '" target="_blank" rel="noopener noreferrer" class="btn btn-view" style="' + viewStyle + '">View Job &#8599;</a>' +
      markAppliedBtn +
      '</div>' +
      '</div>';
  }).join('');
  document.querySelectorAll('.btn-applied:not(.disabled)').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      var jobId = e.target.dataset.jobId;
      jobStatuses[jobId] = 'applied';
      jobs = jobs.map(function(j) { return j.id === jobId ? Object.assign({},j,{status:'applied'}) : j; });
      renderStats();
      render();
    });
  });
}
document.getElementById('search-input').addEventListener('input', function(e) { currentSearch = e.target.value; render(); });
document.getElementById('sort-select').addEventListener('change', function(e) { currentSort = e.target.value; render(); });
init();
</script></body></html>
